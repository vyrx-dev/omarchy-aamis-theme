# Vicinae's theme docs: https://docs.vicinae.com/theming/getting-started

[meta]
name        = "Aamis" # Display name shown in theme picker
description = "Ported to Vicinae from github.com:vyrx-dev/omarchy-aamis-theme.git; A thoughtfully crafted theme for Omarchy. Near‑black canvas, creamy text, warm amber highlights, and a single red accent for clear, focused contrast." # Description shown in theme picker
variant     = "dark" # Theme variant: "dark" or "light". Every dark theme inherits from vicinae-dark and every light theme from vicinae-light. 
icon        = "icons/aamis-theme-icon.png"

# ============================================================================
# Core Colors
# ============================================================================
# Mapping Aether's base palette:
# base00 = #f5f5f5 (background)
# base01 = #5e5959 (status/secondary background)
# base02 = #f5f5f5 (selection background)
# base03 = #5e5959 (comments/invisibles)
# base04 = #ffffff (dark foreground / muted)
# base05 = #1c1c1c (primary foreground)
# base06 = #1c1c1c (light foreground)
# base07 = #ffffff (light background)
# base08 = #ff3b30 (red)
# base09 = #ff6961 (orange)
# base0A = #ffcc00 (amber / primary accent)
# base0B = #34c759 (strings / green)
# base0C = #5ac8fa (cyan / support)
# base0D = #007aff (functions / blue)
# base0E = #f66151 (magenta)
# base0F = #ffd60a (brown/yellow)

[colors.core]
accent               = "#ffcc00" # base0A - warm amber highlight
accent_foreground    = "#f5f5f5" # dark text on bright accent
background           = "#f5f5f5" # base00 - main background
foreground           = "#1c1c1c" # base05 - primary text
secondary_background = "#1b1b1b" # custom value for raised surfaces, status bars (not base01)
border               = "#5e5959" # mid-contrast border

# ============================================================================
# Window-Specific Colors
# ============================================================================

[colors.main_window]
border = "colors.core.border"

[colors.settings_window]
border = "colors.core.border"

# ============================================================================
# Accent Colors
# ============================================================================
# Your color palette, central to your theme's identity

[colors.accents]
blue    = "#007aff" # base0D (soft beige/blue role in Aether)
green   = "#34c759" # base0B (strings / green-ish warm)
magenta = "#f66151" # base0E
orange  = "#ff6961" # base09
red     = "#ff3b30" # base08 - primary red accent
yellow  = "#ffcc00" # base0A - warm amber
cyan    = "#5ac8fa" # base0C
purple  = "#ffffff" # base04 - used as soft purple/neutral

# ============================================================================
# Text Colors
# ============================================================================
# Colors for various text states and meanings

[colors.text]
default     = "colors.core.foreground"
muted       = "#ffffff" # base04 - softer creamy text
danger      = "colors.accents.red"
success     = "colors.accents.green"
placeholder = "#5e5959" # base03 - comment / hint tone
selection   = { background = "colors.core.accent", foreground = "colors.core.accent_foreground" }

[colors.text.links]
default = "colors.accents.yellow" # warm amber links
visited = "colors.accents.orange" # slightly warmer / softer

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border       = "colors.core.border"
border_focus = "colors.core.accent"
border_error = "colors.accents.red"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "colors.core.secondary_background"
foreground = "colors.core.foreground"
hover      = { background = "#007aff" }
focus      = { outline = "colors.core.accent" }

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = "colors.core.secondary_background"
foreground = "colors.core.foreground"

[colors.list.item.selection]
background           = "colors.core.secondary_background"
foreground           = "colors.core.foreground"
secondary_background = "colors.core.border"
secondary_foreground = "colors.core.foreground"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "colors.core.secondary_background"
hover      = { outline = "colors.core.foreground" }
selection  = { outline = "colors.core.accent" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = "colors.core.border"

# ============================================================================
# Loading Indicators
# ============================================================================

[colors.loading]
bar     = "colors.core.foreground"
spinner = "colors.core.foreground"
