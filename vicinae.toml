# Vicinae's theme docs: https://docs.vicinae.com/theming/getting-started

[meta]
name        = "Aamis" # Display name shown in theme picker
description = "Ported to Vicinae from github.com:vyrx-dev/omarchy-aamis-theme.git; A refined macOS Liquid Glass theme for Omarchy." # Description shown in theme picker
variant     = "light" # Theme variant: "dark" or "light". Every dark theme inherits from vicinae-dark and every light theme from vicinae-light. 
icon        = "icons/aamis-theme-icon.png"

# ============================================================================
# Core Colors
# ============================================================================
# Mapping Aether's base palette:
# base00 = #f5f5f5 (background)
# base01 = #3a3a3a (status/secondary background)
# base02 = #f5f5f5 (selection background)
# base03 = #3a3a3a (comments/invisibles)
# base04 = #000000 (dark foreground / muted)
# base05 = #000000 (primary foreground)
# base06 = #000000 (light foreground)
# base07 = #f0f0f0 (light background)
# base08 = #ff3b30 (red)
# base09 = #d94a42 (orange)
# base0A = #d4a800 (amber / primary accent)
# base0B = #34c759 (strings / green)
# base0C = #0095c8 (cyan / support)
# base0D = #007aff (functions / blue)
# base0E = #f66151 (magenta)
# base0F = #cc9900 (brown/yellow)

[colors.core]
accent               = "#d4a800" # base0A - warm amber highlight
accent_foreground    = "#f5f5f5" # dark text on bright accent
background           = "#f5f5f5" # base00 - main background
foreground           = "#000000" # base05 - primary text
secondary_background = "#e8e8e8" # custom value for raised surfaces, status bars
border               = "#6b6b70" # mid-contrast border

# ============================================================================
# Window-Specific Colors
# ============================================================================

[colors.main_window]
border = "colors.core.border"

[colors.settings_window]
border = "colors.core.border"

# ============================================================================
# Accent Colors
# ============================================================================
# Your color palette, central to your theme's identity

[colors.accents]
blue    = "#007aff" # base0D
green   = "#34c759" # base0B
magenta = "#f66151" # base0E
orange  = "#d94a42" # base09
red     = "#ff3b30" # base08 - primary red accent
yellow  = "#d4a800" # base0A - warm amber
cyan    = "#0095c8" # base0C
purple  = "#af52de" # base04 - used as soft purple/neutral

# ============================================================================
# Text Colors
# ============================================================================
# Colors for various text states and meanings

[colors.text]
default     = "colors.core.foreground"
muted       = "#6b6b70" # base04 - softer text
danger      = "colors.accents.red"
success     = "colors.accents.green"
placeholder = "#6b6b70" # base03 - comment / hint tone
selection   = { background = "colors.core.accent", foreground = "colors.core.accent_foreground" }

[colors.text.links]
default = "colors.accents.yellow" # warm amber links
visited = "colors.accents.orange" # slightly warmer / softer

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border       = "colors.core.border"
border_focus = "colors.core.accent"
border_error = "colors.accents.red"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "colors.core.secondary_background"
foreground = "colors.core.foreground"
hover      = { background = "#007aff" }
focus      = { outline = "colors.core.accent" }

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = "colors.core.secondary_background"
foreground = "colors.core.foreground"

[colors.list.item.selection]
background           = "colors.core.secondary_background"
foreground           = "colors.core.foreground"
secondary_background = "colors.core.border"
secondary_foreground = "colors.core.foreground"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "colors.core.secondary_background"
hover      = { outline = "colors.core.foreground" }
selection  = { outline = "colors.core.accent" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = "colors.core.border"

# ============================================================================
# Loading Indicators
# ============================================================================

[colors.loading]
bar     = "colors.core.foreground"
spinner = "colors.core.foreground"